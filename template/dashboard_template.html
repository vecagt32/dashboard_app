<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analytics | Performance & Qualidade</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');

:root{

    --bg:#071018;
    --panel:#101C2B;
    --card:#162436;
    --border:#223449;

    --txt:#F8FAFC;
    --muted:#8DA2B5;

    --blue:#1DA1F2;
    --cyan:#00D2FF;
    --green:#16C784;
    --yellow:#F5B700;
    --red:#FF4D4F;

}

*{

    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;

}

body{

    background:linear-gradient(
        180deg,
        #071018 0%,
        #0C1623 100%
    );

    color:var(--txt);

    min-height:100vh;

    padding:30px;

}

/* HEADER */

header{

    display:flex;
    justify-content:space-between;
    align-items:flex-end;

    margin-bottom:30px;

    border-bottom:1px solid var(--border);

    padding-bottom:20px;

}

header h1{

    font-size:42px;
    font-weight:900;
    letter-spacing:-2px;
    text-transform:uppercase;

}

header h1 span{

    color:var(--cyan);

}

.subtitle{

    margin-top:8px;
    color:var(--muted);
    font-size:14px;

}

.top-kpis{

    display:flex;
    gap:20px;

}

.kpi{

    background:var(--panel);

    border:1px solid var(--border);

    padding:18px 25px;

    border-radius:14px;

    min-width:180px;

}

.kpi .lbl{

    font-size:11px;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:700;
    letter-spacing:1px;

}

.kpi .val{

    font-size:34px;
    font-weight:900;
    margin-top:8px;

}

/* CONTROLES */

.controls{

    margin-bottom:30px;

}

.controls input{

    width:100%;
    max-width:450px;

    background:var(--panel);

    border:1px solid var(--border);

    padding:14px 18px;

    border-radius:12px;

    color:white;

    outline:none;

    font-size:14px;

}

/* GRID */

.grid{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(350px,1fr)
    );

    gap:22px;

}

.card{

    background:linear-gradient(
        145deg,
        rgba(22,36,54,.95),
        rgba(12,24,38,.95)
    );

    border:1px solid var(--border);

    border-radius:18px;

    padding:24px;

    position:relative;

    overflow:hidden;

    transition:.25s;

    cursor:pointer;

}

.card:hover{

    transform:translateY(-5px);

    border-color:var(--cyan);

    box-shadow:
    0 10px 35px rgba(0,210,255,.15);

}

.card::before{

    content:'';

    position:absolute;

    left:0;
    top:0;

    width:5px;
    height:100%;

}

.status-good::before{

    background:var(--green);

}

.status-warn::before{

    background:var(--yellow);

}

.status-bad::before{

    background:var(--red);

}

.c-header{

    display:flex;
    justify-content:space-between;
    align-items:flex-start;

    margin-bottom:24px;

}

.c-title{

    font-size:22px;
    font-weight:800;

}

.c-sub{

    margin-top:6px;

    color:var(--muted);

    font-size:13px;

}

.score-box{

    background:#0B1623;

    border:1px solid var(--border);

    padding:10px 14px;

    border-radius:12px;

    text-align:center;

}

.score-box .v{

    font-size:26px;
    font-weight:900;

}

.score-box .l{

    font-size:10px;
    text-transform:uppercase;
    color:var(--muted);

}

/* STATS */

.stats{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:16px;

}

.stat{

    background:rgba(255,255,255,.02);

    border:1px solid rgba(255,255,255,.03);

    padding:14px;

    border-radius:12px;

}

.stat .lbl{

    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;

}

.stat .val{

    margin-top:8px;

    font-size:24px;
    font-weight:800;

}

/* MODAL */

.modal-overlay{

    position:fixed;

    left:0;
    top:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.75);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:999;

}

.modal{

    width:92%;
    max-width:1200px;

    background:var(--panel);

    border:1px solid var(--border);

    border-radius:20px;

    overflow:hidden;

}

.modal-header{

    padding:25px 30px;

    border-bottom:1px solid var(--border);

    display:flex;
    justify-content:space-between;
    align-items:center;

}

.modal-title{

    font-size:28px;
    font-weight:900;

}

.close{

    font-size:34px;
    cursor:pointer;

}

.modal-body{

    padding:30px;

}

.detail-grid{

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    gap:20px;

}

.detail-card{

    background:var(--card);

    border:1px solid var(--border);

    border-radius:16px;

    padding:22px;

}

.detail-card .lbl{

    font-size:11px;
    text-transform:uppercase;
    color:var(--muted);

}

.detail-card .val{

    margin-top:12px;

    font-size:38px;
    font-weight:900;

}

@media(max-width:900px){

    .detail-grid{

        grid-template-columns:1fr;

    }

    header{

        flex-direction:column;
        align-items:flex-start;
        gap:20px;

    }

}

</style>

</head>

<body>

<script>

/* =====================================================
   BLOCO PADRÃO - NÃO ALTERAR
===================================================== */

const RESP = {};

/* =====================================================
   PROCESSAMENTO DINÂMICO
===================================================== */

let dadosProcessados = {}

function n(v){

    return String(v || '')
    .trim()
    .toLowerCase()

}

function num(v){

    if(v === null || v === undefined){

        return 0

    }

    if(typeof v === 'number'){

        return v

    }

    const t = String(v)
    .replace('%','')
    .replace(',','.')
    .trim()

    const r = parseFloat(t)

    return isNaN(r) ? 0 : r

}

function statusClasse(score){

    if(score >= 85){

        return 'status-good'

    }

    if(score >= 60){

        return 'status-warn'

    }

    return 'status-bad'
}

function corScore(score){

    if(score >= 85){

        return 'var(--green)'

    }

    if(score >= 60){

        return 'var(--yellow)'

    }

    return 'var(--red)'
}

function formatarNumero(v){

    return Number(v || 0).toFixed(0)
}

function criarProcesso(nome){

    if(!dadosProcessados[nome]){

        dadosProcessados[nome] = {

            nome:nome,

            gestor:'Não Definido',

            score_geral:0,

            risco:{
                nivel:'BAIXO',
                tendencia:'ESTÁVEL'
            },

            performance:{
                acoes:0,
                indicadores:0,
                resolutividade:0
            },

            acoes:[],
            indicadores:[],
            notificacoes:[]

        }

    }

    return dadosProcessados[nome]

}

function processarDados(){

    dadosProcessados = {}

    const acoes = RESP.acoes || []
    const indicadores = RESP.indicadores || []
    const notificacoes = RESP.notificacoes || []

    /* =========================
       AÇÕES
    ========================= */

    acoes.forEach(a=>{

        const nome = (

            a.Setor ||
            a.Processo ||
            a.Area ||
            'Não Informado'

        )

        const p = criarProcesso(nome)

        p.gestor = (

            a.Responsavel ||
            a.Responsável ||
            p.gestor

        )

        p.acoes.push(a)

    })

    /* =========================
       INDICADORES
    ========================= */

    indicadores.forEach(i=>{

        const nome = (

            i.Setor ||
            i.Processo ||
            i.Area ||
            'Não Informado'

        )

        const p = criarProcesso(nome)

        p.indicadores.push(i)

    })

    /* =========================
       NOTIFICAÇÕES
    ========================= */

    notificacoes.forEach(notif=>{

        const nome = (

            notif['Processo Notificado'] ||
            notif.Processo ||
            notif.Setor ||
            'Não Informado'

        )

        const p = criarProcesso(nome)

        p.notificacoes.push(notif)

    })

    /* =========================
       SCORE
    ========================= */

    Object.values(
        dadosProcessados
    ).forEach(proc=>{

        /* AÇÕES */

        let somaAcoes = 0

        proc.acoes.forEach(a=>{

            let progresso = num(

                a.Progresso ||
                a.Andamento ||
                a.Percentual ||
                0

            )

            if(progresso <= 1){

                progresso = progresso * 100

            }

            somaAcoes += progresso

        })

        proc.performance.acoes = (

            proc.acoes.length > 0

            ?

            somaAcoes / proc.acoes.length

            :

            100

        )

        /* INDICADORES */

        let pesoTotal = 0
        let scoreIndicadores = 0

        proc.indicadores.forEach(i=>{

            const nomeIndicador = n(

                i.Indicador ||
                i.Indicadores ||
                i.Nome ||
                ''

            )

            let peso = 1

            if(

                nomeIndicador.includes('estratégico') ||
                nomeIndicador.includes('estrategico') ||
                nomeIndicador.includes('resultado')

            ){

                peso = 3

            }

            const status = n(

                i.Status ||
                i.Prazo ||
                i.Situacao ||
                ''

            )

            let nota = 20

            if(

                status.includes('dentro') ||
                status.includes('ok') ||
                status.includes('atingido')

            ){

                nota = 100

            }
            else if(

                status.includes('atenção') ||
                status.includes('atencao') ||
                status.includes('parcial')

            ){

                nota = 60

            }

            pesoTotal += peso

            scoreIndicadores += (

                nota * peso

            )

        })

        proc.performance.indicadores = (

            pesoTotal > 0

            ?

            scoreIndicadores / pesoTotal

            :

            100

        )

        /* NOTIFICAÇÕES */

        let scoreNotif = 100

        if(proc.notificacoes.length > 0){

            let somaNotif = 0

            proc.notificacoes.forEach(nf=>{

                const status = n(

                    nf.Situação ||
                    nf.Situacao ||
                    nf.Status ||
                    ''

                )

                const tipo = n(

                    nf.Tipo || ''

                )

                let nota = 100

                if(

                    status.includes('nova') ||
                    status.includes('pendente')

                ){

                    nota = 20

                }
                else if(

                    status.includes('tratativa') ||
                    status.includes('analise')

                ){

                    nota = 60

                }

                if(

                    tipo.includes('incidente')

                ){

                    nota -= 20

                }

                somaNotif += nota

            })

            scoreNotif = (

                somaNotif /
                proc.notificacoes.length

            )

        }

        proc.performance.resolutividade = scoreNotif

        /* SCORE FINAL */

        proc.score_geral = (

            proc.performance.acoes * 0.35 +

            proc.performance.indicadores * 0.40 +

            proc.performance.resolutividade * 0.25

        )

        proc.score_geral = Math.max(
            0,
            Math.min(100,proc.score_geral)
        )

        /* RISCO */

        if(proc.score_geral >= 85){

            proc.risco.nivel = 'BAIXO'
            proc.risco.tendencia = 'POSITIVA'

        }
        else if(proc.score_geral >= 60){

            proc.risco.nivel = 'MODERADO'
            proc.risco.tendencia = 'ATENÇÃO'

        }
        else{

            proc.risco.nivel = 'CRÍTICO'
            proc.risco.tendencia = 'NEGATIVA'

        }

    })

}

</script>

<header>

    <div>

        <h1>
            Performance
            <span>
                Analytics
            </span>
        </h1>

        <div class="subtitle">

            Dashboard Corporativo ONA

        </div>

    </div>

    <div class="top-kpis">

        <div class="kpi">

            <div class="lbl">

                Score Global

            </div>

            <div
                class="val"
                id="kpi-score"
            >
                0%
            </div>

        </div>

        <div class="kpi">

            <div class="lbl">

                Ocorrências Críticas

            </div>

            <div
                class="val"
                id="kpi-crits"
            >
                0
            </div>

        </div>

    </div>

</header>

<div class="controls">

    <input
        type="text"
        id="search-input"
        placeholder="Buscar processo, setor ou tendência..."
        onkeyup="renderDashboard()"
    >

</div>

<div
    class="grid"
    id="main-grid"
></div>

<div
    class="modal-overlay"
    id="modal"
    onclick="if(event.target===this)closeModal()"
>

    <div class="modal">

        <div class="modal-header">

            <div>

                <div
                    class="modal-title"
                    id="modal-title"
                >
                    Processo
                </div>

                <div
                    id="modal-subtitle"
                    style="
                        margin-top:6px;
                        color:var(--muted);
                    "
                >
                    Risco
                </div>

            </div>

            <div
                class="close"
                onclick="closeModal()"
            >
                ×
            </div>

        </div>

        <div
            class="modal-body"
            id="modal-body"
        ></div>

    </div>

</div>

<script>

function renderDashboard(){

    const grid = document.getElementById(
        'main-grid'
    )

    grid.innerHTML = ''

    const busca = document
        .getElementById(
            'search-input'
        )
        .value
        .toLowerCase()

    let soma = 0
    let total = 0
    let criticos = 0

    Object.entries(
        dadosProcessados
    ).forEach(

        ([nome,dados])=>{

            const texto = (

                nome + ' ' +
                dados.gestor + ' ' +
                dados.risco.tendencia

            ).toLowerCase()

            if(
                busca &&
                !texto.includes(busca)
            ){

                return

            }

            total++

            soma += dados.score_geral

            const pendentes = dados.notificacoes.filter(nf=>{

                const st = n(

                    nf.Situação ||
                    nf.Situacao ||
                    nf.Status

                )

                return (

                    st.includes('nova') ||
                    st.includes('pendente')

                )

            }).length

            criticos += pendentes

            const card = document.createElement(
                'div'
            )

            card.className = (

                'card ' +
                statusClasse(
                    dados.score_geral
                )

            )

            card.innerHTML = `

                <div class="c-header">

                    <div>

                        <div class="c-title">

                            ${nome}

                        </div>

                        <div class="c-sub">

                            Gestor:
                            ${dados.gestor}

                        </div>

                    </div>

                    <div class="score-box">

                        <div
                            class="v"
                            style="
                                color:${corScore(
                                    dados.score_geral
                                )}
                            "
                        >

                            ${formatarNumero(
                                dados.score_geral
                            )}%

                        </div>

                        <div class="l">

                            Score

                        </div>

                    </div>

                </div>

                <div class="stats">

                    <div class="stat">

                        <div class="lbl">

                            Ações ONA

                        </div>

                        <div class="val">

                            ${dados.acoes.length}

                        </div>

                    </div>

                    <div class="stat">

                        <div class="lbl">

                            Score ONA

                        </div>

                        <div class="val">

                            ${formatarNumero(
                                dados.performance.acoes
                            )}%

                        </div>

                    </div>

                    <div class="stat">

                        <div class="lbl">

                            Indicadores

                        </div>

                        <div class="val">

                            ${dados.indicadores.length}

                        </div>

                    </div>

                    <div class="stat">

                        <div class="lbl">

                            Score Indicadores

                        </div>

                        <div class="val">

                            ${formatarNumero(
                                dados.performance.indicadores
                            )}%

                        </div>

                    </div>

                    <div class="stat">

                        <div class="lbl">

                            Notificações

                        </div>

                        <div class="val">

                            ${dados.notificacoes.length}

                        </div>

                    </div>

                    <div class="stat">

                        <div class="lbl">

                            Resolutividade

                        </div>

                        <div
                            class="val"
                            style="
                                color:${corScore(
                                    dados.performance.resolutividade
                                )}
                            "
                        >

                            ${formatarNumero(
                                dados.performance.resolutividade
                            )}%

                        </div>

                    </div>

                </div>

            `

            card.onclick = ()=>{

                abrirDetalhes(
                    nome,
                    dados
                )

            }

            grid.appendChild(
                card
            )

        }

    )

    const media = (

        total > 0

        ?

        soma / total

        :

        0

    )

    document.getElementById(
        'kpi-score'
    ).innerText = (
        formatarNumero(media) + '%'
    )

    document.getElementById(
        'kpi-score'
    ).style.color = corScore(
        media
    )

    document.getElementById(
        'kpi-crits'
    ).innerText = criticos

}

function abrirDetalhes(
    nome,
    dados
){

    document.getElementById(
        'modal-title'
    ).innerText = nome

    document.getElementById(
        'modal-subtitle'
    ).innerText = (

        'Gestor: ' +
        dados.gestor

    )

    document.getElementById(
        'modal-body'
    ).innerHTML = `

        <div class="detail-grid">

            <div class="detail-card">

                <div class="lbl">

                    Score Geral

                </div>

                <div
                    class="val"
                    style="
                        color:${corScore(
                            dados.score_geral
                        )}
                    "
                >

                    ${formatarNumero(
                        dados.score_geral
                    )}%

                </div>

            </div>

            <div class="detail-card">

                <div class="lbl">

                    Risco

                </div>

                <div class="val">

                    ${dados.risco.nivel}

                </div>

            </div>

            <div class="detail-card">

                <div class="lbl">

                    Tendência

                </div>

                <div class="val">

                    ${dados.risco.tendencia}

                </div>

            </div>

            <div class="detail-card">

                <div class="lbl">

                    Ações ONA

                </div>

                <div class="val">

                    ${dados.acoes.length}

                </div>

            </div>

            <div class="detail-card">

                <div class="lbl">

                    Indicadores

                </div>

                <div class="val">

                    ${dados.indicadores.length}

                </div>

            </div>

            <div class="detail-card">

                <div class="lbl">

                    Notificações

                </div>

                <div class="val">

                    ${dados.notificacoes.length}

                </div>

            </div>

        </div>

    `

    document.getElementById(
        'modal'
    ).style.display = 'flex'
}

function closeModal(){

    document.getElementById(
        'modal'
    ).style.display = 'none'

}

window.onload = ()=>{

    processarDados()

    renderDashboard()

}

</script>

</body>
</html>
