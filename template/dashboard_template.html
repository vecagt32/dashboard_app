<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placar de Qualidade ONA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,400;0,700;0,900;1,700&display=swap');

  :root {
    --br-green: #009c3b;
    --br-green-dark: #0a2918;
    --br-yellow: #ffdf00;
    --br-blue: #002776;
    --white: #ffffff;
    --red-card: #e50000;
    --yellow-card: #ffcc00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: 'Roboto Condensed', sans-serif; 
    background-color: var(--br-green-dark); 
    background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 80px);
    color: var(--white); 
    min-height: 100vh; 
    padding: 10px 20px;
  }

  /* CABEÇALHO ESTILO TRANSMISSÃO ESPORTIVA */
  .tv-header {
    background: linear-gradient(90deg, var(--br-blue) 0%, #00123a 100%);
    border-bottom: 5px solid var(--br-yellow);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 8px 8px 0 0;
    margin-bottom: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    text-transform: uppercase;
  }
  .tv-header h1 { font-weight: 900; font-size: 28px; font-style: italic; text-shadow: 2px 2px 0px #000; }
  .tv-header h1 span { color: var(--br-yellow); }
  .match-time { font-weight: 700; font-size: 18px; background: #000; padding: 5px 15px; border-radius: 4px; border: 1px solid #333;}

  /* PLACAR GLOBAL (KPIS) */
  .placar-global {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin-bottom: 30px;
  }
  .stat-box {
    background: var(--br-green);
    border-left: 6px solid var(--br-yellow);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }
  .stat-box::after {
    content: ''; position: absolute; right: -20px; top: -20px; width: 100px; height: 100px;
    background: rgba(255,255,255,0.1); transform: rotate(45deg);
  }
  .stat-box.danger { border-left-color: var(--red-card); background: #3a0d0d; }
  .stat-box .title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .stat-box .value { font-size: 38px; font-weight: 900; text-shadow: 2px 2px 0px #000; }

  /* GRADE DE GESTORES (JOGADORES EM CAMPO) */
  .grid-campo {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
  }

  /* CARTÃO DE JOGADOR (GESTORES) */
  .card-jogador {
    background: #113320;
    border: 2px solid #1a4d30;
    border-radius: 10px;
    position: relative;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    transition: transform 0.2s;
  }
  .card-jogador:hover { transform: scale(1.02); border-color: var(--br-yellow); }

  .cj-header {
    background: var(--br-blue);
    padding: 15px;
    border-radius: 8px 8px 0 0;
    border-bottom: 3px solid var(--br-yellow);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cj-nome { font-size: 20px; font-weight: 900; text-transform: uppercase; text-shadow: 1px 1px 2px #000;}
  .cj-setor { font-size: 12px; color: #b0c4de; font-weight: 700; margin-top: 3px;}
  
  .badge-nota {
    background: var(--br-green);
    color: var(--white);
    font-size: 24px;
    font-weight: 900;
    padding: 8px 12px;
    border-radius: 6px;
    border: 2px solid var(--white);
    box-shadow: 2px 2px 0px #000;
  }
  .badge-nota.ruim { background: var(--red-card); }
  .badge-nota.media { background: #d47e00; }

  .cj-body { padding: 15px; }

  /* Barras de Estatísticas Estilo Pênaltis/Posse */
  .linha-stat { margin-bottom: 12px; }
  .ls-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
  .bar-bg { background: #0a2918; height: 12px; border-radius: 6px; overflow: hidden; border: 1px solid #1a4d30; }
  .bar-fill { height: 100%; background: var(--br-yellow); transition: width 0.5s ease; }
  .bar-fill.green { background: #39FF14; }
  .bar-fill.red { background: var(--red-card); }

  /* Seção de Faltas/Cartões (Notificações) */
  .painel-faltas {
    background: #0a1f14;
    padding: 10px;
    border-radius: 6px;
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-left: 4px solid var(--red-card);
  }
  .cartao-icone {
    display: inline-block; width: 14px; height: 18px; background: var(--red-card);
    border-radius: 2px; margin-right: 5px; box-shadow: 1px 1px 2px #000;
  }
</style>
</head>
<body>

<script>
const RESP = {
  "Mylena Justino": {
    "diretoria": "Diretoria Geral", "setores": ["PAM", "APGQ"],
    "acoes": {"total": 8, "prog_geral": 75.5, "concluidas": 5, "em_andamento": 3, "nao_iniciada": 0, "atrasada": 0},
    "indicadores": {"total_reg": 5, "dentro": 4, "fora": 1, "conformidade": 80.0},
    "notificacoes": {"total": 3, "resolvidas": 3, "andamento": 0, "tx_resolucao": 100.0}
  },
  "Gestor Modelo (Demo)": {
    "diretoria": "Diretoria Técnica", "setores": ["UTI", "Centro Cirúrgico"],
    "acoes": {"total": 12, "prog_geral": 45.0, "concluidas": 4, "em_andamento": 8, "nao_iniciada": 0, "atrasada": 0},
    "indicadores": {"total_reg": 10, "dentro": 5, "fora": 5, "conformidade": 50.0},
    "notificacoes": {"total": 5, "resolvidas": 2, "andamento": 3, "tx_resolucao": 40.0}
  }
};
</script>
<div class="tv-header">
  <div>
    <h1>BRASILEIRÃO DA <span>QUALIDADE</span></h1>
    <div style="font-size: 14px; color: #b0c4de; margin-top: 2px; font-weight: 700;">TEMPORADA ONA 2026 - PLACAR GERAL</div>
  </div>
  <div class="match-time" id="data-atual">90:00</div>
</div>

<div class="placar-global">
  <div class="stat-box">
    <div>
      <div class="title">Posse Estratégica (Ações)</div>
      <div style="font-size: 12px; opacity: 0.8; margin-top: 4px;">Plano Tático ONA</div>
    </div>
    <div class="value" id="tot-acoes">0</div>
  </div>
  <div class="stat-box">
    <div>
      <div class="title">Passes Certos (Ind. OK)</div>
      <div style="font-size: 12px; opacity: 0.8; margin-top: 4px;">Conformidade Geral</div>
    </div>
    <div class="value" style="color: #39FF14;" id="tot-ind">0</div>
  </div>
  <div class="stat-box danger">
    <div>
      <div class="title">Cartões Vermelhos</div>
      <div style="font-size: 12px; opacity: 0.8; margin-top: 4px;">Incidentes Pendentes</div>
    </div>
    <div class="value" style="color: var(--red-card);" id="tot-pendentes">0</div>
  </div>
</div>

<div class="grid-campo" id="grid-campo">
  </div>

<script>
  // Define a data atual no placar
  const hoje = new Date();
  document.getElementById('data-atual').innerText = hoje.toLocaleDateString('pt-BR');

  function calcularScoreGeral(acoes, indicadores, notificacoes) {
    // Calculo do "Aproveitamento do Time" (0 a 100)
    let pesoAcoes = acoes.prog_geral || 0;
    let pesoInd = indicadores.conformidade || 0;
    let mediaTatica = (pesoAcoes + pesoInd) / 2; 
    
    // Penalidade grave se houver incidentes/notificações pendentes (Cartões vermelhos afetam o time)
    let penalidade = notificacoes.andamento * 10;
    let score = mediaTatica - penalidade;

    return Math.max(0, Math.min(100, Math.round(score)));
  }

  function renderizarCards() {
    const grid = document.getElementById('grid-campo');
    grid.innerHTML = '';

    let globalAcoes = 0;
    let globalIndDentro = 0;
    let globalPendentes = 0;

    // Loop na estrutura de JSON que o Python envia
    for (const [nomeGestor, dados] of Object.entries(RESP)) {
      
      // Alimentar Placar Global
      globalAcoes += dados.acoes.total;
      globalIndDentro += dados.indicadores.dentro;
      globalPendentes += dados.notificacoes.andamento;

      // Calcular Score
      let score = calcularScoreGeral(dados.acoes, dados.indicadores, dados.notificacoes);
      let corScore = score >= 75 ? '' : (score >= 50 ? 'media' : 'ruim');
      
      let nomeExibicao = nomeGestor === 'nan' ? 'Sem Gestor Definido' : nomeGestor;
      let setoresExibicao = dados.setores.join(' / ') || 'Sem Setor';

      let cardHTML = `
        <div class="card-jogador">
          <div class="cj-header">
            <div>
              <div class="cj-nome">${nomeExibicao}</div>
              <div class="cj-setor">${dados.diretoria} • ${setoresExibicao}</div>
            </div>
            <div class="badge-nota ${corScore}">${score}</div>
          </div>
          
          <div class="cj-body">
            
            <div class="linha-stat">
              <div class="ls-header">
                <span>🎯 Tática ONA (Progresso)</span>
                <span>${dados.acoes.prog_geral}%</span>
              </div>
              <div class="bar-bg">
                <div class="bar-fill" style="width: ${dados.acoes.prog_geral}%;"></div>
              </div>
              <div style="font-size: 11px; color:#aaa; margin-top:3px; text-align:right;">
                ${dados.acoes.concluidas} de ${dados.acoes.total} Concluídas
              </div>
            </div>

            <div class="linha-stat" style="margin-top:15px;">
              <div class="ls-header">
                <span>⚽ Passes Certos (Indicadores)</span>
                <span>${dados.indicadores.conformidade}%</span>
              </div>
              <div class="bar-bg">
                <div class="bar-fill green" style="width: ${dados.indicadores.conformidade}%;"></div>
              </div>
              <div style="font-size: 11px; color:#aaa; margin-top:3px; text-align:right;">
                ${dados.indicadores.dentro} OK / ${dados.indicadores.fora} Fora
              </div>
            </div>

            <div class="painel-faltas">
              <div>
                <div style="font-size: 11px; color:#aaa; text-transform:uppercase;">Notificações Pendentes</div>
                <div style="font-size: 18px; font-weight:900; display:flex; align-items:center; margin-top:4px;">
                  <span class="cartao-icone"></span> ${dados.notificacoes.andamento} 
                  <span style="font-size: 12px; font-weight:400; margin-left: 10px; color:#888;">(De ${dados.notificacoes.total} totais)</span>
                </div>
              </div>
              <div style="text-align:right;">
                <div style="font-size: 11px; color:#aaa; text-transform:uppercase;">Resolutividade</div>
                <div style="font-size: 18px; font-weight:900; color: ${dados.notificacoes.tx_resolucao >= 80 ? '#39FF14' : 'var(--br-yellow)'};">
                  ${dados.notificacoes.tx_resolucao}%
                </div>
              </div>
            </div>

          </div>
        </div>
      `;

      grid.innerHTML += cardHTML;
    }

    // Atualiza placar mestre lá em cima
    document.getElementById('tot-acoes').innerText = globalAcoes;
    document.getElementById('tot-ind').innerText = globalIndDentro;
    document.getElementById('tot-pendentes').innerText = globalPendentes;
  }

  // Inicia renderização ao carregar
  window.onload = () => {
    if(Object.keys(RESP).length > 0) {
      renderizarCards();
    } else {
      document.getElementById('grid-campo').innerHTML = '<h3 style="color:#aaa;">Nenhum dado recebido do Python ainda. Faça o upload no Streamlit.</h3>';
    }
  };
</script>
</body>
</html>
