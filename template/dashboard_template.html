<!DOCTYPE html>
card.className='card';

card.innerHTML=`

<div class="rank">#${index+1}</div>

<div class="nome">${nome}</div>

<div class="score" style="--score:${d.score_geral}">
${d.score_geral.toFixed(1)}
</div>

<div class="risco" style="color:${scoreColor(d.score_geral)}">
${d.risco.nivel}
</div>

<div class="metrics">

<div class="metric">
<label>Ações</label>
<strong>${d.performance.acoes}%</strong>
<div class="bar">
<div class="fill" style="width:${d.performance.acoes}%;background:${scoreColor(d.performance.acoes)}"></div>
</div>
</div>

<div class="metric">
<label>Indicadores</label>
<strong>${d.performance.indicadores}%</strong>
<div class="bar">
<div class="fill" style="width:${d.performance.indicadores}%;background:${scoreColor(d.performance.indicadores)}"></div>
</div>
</div>

<div class="metric">
<label>Notificações</label>
<strong>${d.performance.notificacoes}%</strong>
<div class="bar">
<div class="fill" style="width:${d.performance.notificacoes}%;background:${scoreColor(d.performance.notificacoes)}"></div>
</div>
</div>

<div class="metric">
<label>Resolutividade</label>
<strong>${d.performance.resolutividade}%</strong>
<div class="bar">
<div class="fill" style="width:${d.performance.resolutividade}%;background:${scoreColor(d.performance.resolutividade)}"></div>
</div>
</div>

</div>

`;

root.appendChild(card);

});

}

render();

</script>
</body>
</html>
